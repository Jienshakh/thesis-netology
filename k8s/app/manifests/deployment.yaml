apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-test-app
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-test-app
  template:
    metadata:
      labels:
        app: nginx-test-app
    spec:
      containers:
      - name: nginx-test-app
        image: jienshakh/nginx-test-app:v0.1
        ports:
        - containerPort: 80