apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: helm-deployer
  namespace: default
rules:
  - apiGroups: ["", "apps", "networking.k8s.io"]
    resources:
      - deployments
      - replicasets
      - pods
      - services
      - configmaps
      - secrets
      - ingresses
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]