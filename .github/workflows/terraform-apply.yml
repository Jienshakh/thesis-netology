name: Terraform Apply on main

on:
  push:
    branches: [ main ]
    paths:
      - 'infra/**'

jobs:
  terraform-infra:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.5

      - name: Setup auth
        run: |
          echo '${{ secrets.YC_SA_JSON_KEY }}' > /tmp/sa-key.json
          echo "YC_SERVICE_ACCOUNT_KEY_FILE=/tmp/sa-key.json" >> $GITHUB_ENV

      - name: Terraform Init (infra/)
        working-directory: ./infra
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=infra/terraform.tfstate"

      - name: Terraform Apply
        working-directory: ./infra
        env:
          TF_VAR_cloud_id: ${{ secrets.YC_CLOUD_ID }}
          TF_VAR_folder_id: ${{ secrets.YC_FOLDER_ID }}
          TF_VAR_username: ${{ secrets.YC_USERNAME }}
          TF_VAR_ssh_public_key: ${{ secrets.YC_SSH_PUBLIC_KEY }}
        run: terraform apply -auto-approve